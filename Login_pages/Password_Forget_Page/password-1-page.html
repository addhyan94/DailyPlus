<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="password-1-page.css">
    <title>Reset password</title>
</head>

<body>
    <div class="main">
        <header>
            <div class="back">
                <svg width="40" height="40" viewport="0 0 24 24">
                    <line x1="7" y1="12" x2="18" y2="12" stroke="rgb(44 44 44)" stroke-width="2" />
                    <polyline points="10 8 6 12 10 16" fill="none" stroke="rgb(44 44 44)" stroke-width="2" />
                </svg>
            </div>
        </header>
        <h2>Forgot Your Password?</h2>
        <div class="description">
            <p>Enter the email associated with your DailyPlus account to receive a password reset code</p>
            <div class="form">
                <form action="#">
                    <label for="email">Enter Your Registered email</label>
                    <label class="input">
                        <svg viewBox="0 0 24 24" class="icon">
                            <path d="M4 6h16v12H4z" fill="none" stroke="gray" stroke-width="2" />
                            <path d="M4 6l8 6 8-6" fill="none" stroke="gray" stroke-width="2" />
                        </svg>
                        <input class="input-box" type="email" id="email" name="email"
                            placeholder="alex.asley@domain.com">
                    </label>

            </div>
            </form>
        </div>
        <!-- <div class="footer">
            <footer>
                <button class="send-otp">
                    <p>Send OTP Code</p>
                </button>
            </footer>
        </div> -->
    </div>
</body>

</html>
