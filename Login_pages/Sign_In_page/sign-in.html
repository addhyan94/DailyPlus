<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sign-in.css">
</head>
<body>
    <section class="mobilescreen">
   <header>
        <a class="backbtn" href="../../index.html">↩</a>
      </header>
    <main>
        <section class="first">
            <h1>Welcome back ! 👋</h1>
<p>Sign in to access your personalized habit tracking experience.</p>
        </section>
        <!-- Input section .................................................................. -->

          <section>
            <label for="Email"><h2 class="lableh2">Email</h2></label>
            <div class="entemail">
              <input
                type="email"
                id="Email"
                class="intbox"
                placeholder="📩 Email....."
                required
              />
            </div>
            <label for="Password"><h2 class="lableh2">Password .</h2></label>
            <div class="entpass">
              <input
                type="password"
                id="Password"
                class="intbox"
                placeholder="🔒 Password "
              />
            </div>
          </section>
       <section>
        <div class="box1">
            <span>
           <input type="checkbox" class="ch-box" id="ch"/>
           <label for="ch">Remember me</label></span>
           <span class="forgot_txt"><a href="#">Forgot Password ?</a></span></div>
       
       </section>
       <div class="orli"> -------------------------- OR -------------------------</div>
       <section class="optio">
            <div class="ctn google">Continue With Google</div>
            <div class="ctn microsoft">Continue With Microsoft</div>
            <div class="ctn phone">Continue With Phone No.</div>
          </section>
          <div>
            <a href="#" class="sign-in">Sign in</a>
          </div>
        </main>
    </section>
</body>
</html>
